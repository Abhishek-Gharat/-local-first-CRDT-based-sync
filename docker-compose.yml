services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: docsync
      POSTGRES_PASSWORD: docsync
      POSTGRES_DB: docsync
    ports:
      - "5432:5432"
    volumes:
      - docsync_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsync"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  docsync_pgdata:
